name: Build Windows

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Install dependencies
      run: |
        vcpkg install zlib libpng libjpeg-turbo freetype sdl2 libarchive pixman giflib tinyxml2 curl harfbuzz --triplet x64-windows

    - name: Configure
      run: |
        cd LibreSprite_2.0_A_STUDI0/LibreSprite-master
        cmake -B build -G "Visual Studio 17 2022" -A x64 `
          -DCMAKE_BUILD_TYPE=Release `
          -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake `
          -DVCPKG_TARGET_TRIPLET=x64-windows

    - name: Build
      run: |
        cd LibreSprite_2.0_A_STUDI0/LibreSprite-master
        cmake --build build --config Release --parallel

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: LibreSprite-2.0-Windows
        path: LibreSprite_2.0_A_STUDI0/LibreSprite-master/build/Release/
